<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
  </head>
  <body>
    <script>
      const { pathname, search, hash } = window.location;
      const repoBase = '/Gundex/';
      const route = pathname.startsWith(repoBase)
        ? pathname.slice(repoBase.length)
        : pathname.replace(/^\//, '');
      window.location.replace(`${repoBase}#/${route}${search}${hash}`);
    </script>
  </body>
</html>
